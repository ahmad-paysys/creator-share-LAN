name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rbac-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Run RBAC matrix tests
        run: >
          npm run test --workspace server --
          src/access/policy.test.ts
          src/access/middleware.test.ts
          src/access/existing-routes-authz.test.ts
          src/gallery/routes.test.ts
          src/settings/routes.test.ts

  integration-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Run integration and security suites
        run: >
          npm run test --workspace server --
          src/auth/routes.test.ts
          src/csrf-middleware.test.ts
          src/temporary-views/routes.test.ts
          src/reconciliation/routes.test.ts
          src/ops/routes.test.ts

      - name: Run client contract and UI tests
        run: npm run test --workspace client

  build-and-test:
    runs-on: ubuntu-latest
    needs: [rbac-matrix, integration-regression]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Run full workspace tests
        run: npm run test

      - name: Build
        run: npm run build
